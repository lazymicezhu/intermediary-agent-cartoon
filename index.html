  <body>
    <section class="cover-page" id="cover-page" aria-label="留学中介畅所欲言区">
      <div class="cover-page__inner">
        <p class="cover-page__eyebrow">关于留学中介</p>
        <h1>畅所欲言区</h1>
        <p class="cover-page__copy">你有遇到过类似的套路吗？可以在评论区讲讲</p>
        <button class="cover-page__enter" id="cover-enter" type="button">
          点击进入互动漫画区
        </button>
      </div>
    </section>

    <main class="app-shell">
      <section class="story-stage">
        <div class="chapter-track" id="chapter-track" aria-live="polite"></div>
      </section>
      <section class="chapter-overview" id="chapter-overview" hidden>
        <div class="overview-grid" id="overview-grid"></div>
        <div class="overview-actions">
          <button class="chapter-action" id="overview-replay" type="button">重玩</button>
          <button class="chapter-action" id="overview-comment" type="button">前往评论区</button>
        </div>
      </section>
    </main>

    <div class="comment-bubble-layer" id="comment-bubble-layer" aria-live="polite"></div>

    <aside class="comment-qr" id="comment-qr" aria-label="扫码评论">
      <button class="comment-qr__handle" type="button" aria-label="拖动评论二维码">
        评论
      </button>
      <a class="comment-qr__link" id="comment-qr-link" href="./comment.html" target="_blank" rel="noopener">
        <img class="comment-qr__image" id="comment-qr-image" alt="扫码打开评论页面" />
      </a>
      <p class="comment-qr__hint">点击或扫码参加评论</p>
      <button class="comment-settings-toggle" id="comment-settings-toggle" type="button" aria-label="评论设置">
        ⚙
      </button>
      <div class="comment-settings" id="comment-settings" hidden>
        <div class="comment-qr__control">
          <span>显示评论</span>
          <button
            class="comment-toggle is-on"
            id="comment-toggle"
            type="button"
            role="switch"
            aria-checked="true"
            aria-label="显示或隐藏评论气泡"
          >
            <span></span>
          </button>
        </div>
        <label class="comment-size-control" for="comment-bubble-size">
          <span>气泡大小</span>
          <input id="comment-bubble-size" type="range" min="0" max="2" step="1" value="1" />
          <span class="comment-size-control__labels" aria-hidden="true">
            <span>小</span>
            <span>中</span>
            <span>正常</span>
          </span>
        </label>
        <label class="debug-password-control" for="debug-password">
          <span>调试模式</span>
          <input id="debug-password" type="password" autocomplete="off" placeholder="输入密码" />
        </label>
      </div>
    </aside>

    <div class="debug-controls" id="debug-controls" hidden>
      <button class="chapter-action" id="debug-play" type="button">播放动画</button>
      <button class="chapter-action" id="debug-finish" type="button">结束动画</button>
      <button class="chapter-action" id="debug-next" type="button">快捷下一章</button>
    </div>

    <template id="chapter-template">
      <article class="chapter">
        <div class="chapter-grid"></div>
        <div class="chapter-caption"></div>
        <div class="chapter-actions" hidden>
          <button class="chapter-action" type="button" data-action="previous">上一章</button>
          <button class="chapter-action" type="button" data-action="replay">重玩本章</button>
          <button class="chapter-action" type="button" data-action="next">下一章</button>
          <button class="chapter-action" type="button" data-action="overview">前往总览</button>
        </div>
        <div class="option-strip">
          <div class="option-strip__title">拖动下面的漫画补上最后一格</div>
          <div class="options"></div>
        </div>
      </article>
    </template>

    <template id="panel-template">
      <section class="comic-panel">
        <div class="panel-art"></div>
      </section>
    </template>

    <template id="overview-chapter-template">
      <article class="overview-chapter">
        <div class="overview-label"></div>
        <div class="chapter-grid"></div>
        <div class="overview-caption"></div>
      </article>
    </template>

    <div class="comic-lightbox" id="comic-lightbox" hidden>
      <button class="comic-lightbox__close" id="comic-lightbox-close" type="button" aria-label="关闭放大漫画">×</button>
      <button class="comic-lightbox__nav comic-lightbox__nav--prev" id="comic-lightbox-prev" type="button" aria-label="上一张漫画">‹</button>
      <div class="comic-lightbox__frame" id="comic-lightbox-frame"></div>
      <button class="comic-lightbox__nav comic-lightbox__nav--next" id="comic-lightbox-next" type="button" aria-label="下一张漫画">›</button>
    </div>

    <script type="module" src="./script.js?v=debug-chapters"></script>
